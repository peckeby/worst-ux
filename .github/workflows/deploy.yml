name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# Permissions must be here to allow the deployment to happen
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          # This maps the variable for your code
          BASE_URL: /worst-ux/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Double check your vite.config.ts - if it builds to 'build' instead of 'dist', change this
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
